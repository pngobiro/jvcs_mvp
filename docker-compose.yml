services:
  db:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    network_mode: host
    env_file: .env
    volumes:
      - .:/app
      - /app/_build
      - /app/deps
    environment:
      DATABASE_URL: ecto://postgres:postgres@localhost:5436/judiciary_dev
      PHX_HOST: ${PHX_HOST}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    depends_on:
      - db
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        until pg_isready -h localhost -p 5436 -U postgres; do
          echo 'DB not ready, retrying in 2s...'
          sleep 2
        done &&
        echo 'Database ready!' &&
        mix deps.get &&
        mix ecto.setup &&
        mix phx.server
      "

volumes:
  postgres_data:
